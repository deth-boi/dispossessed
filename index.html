<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOOM - Point & Click</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hud">

        <!-- TOP: Dialogue box (DOOM-style message bar) -->
        <div id="dialogue" class="dialogue">
            Welcome to the facility, marine. Click doors to move.
        </div>

        <!-- MIDDLE: Player viewport (exactly 1680×1080) -->
        <div id="viewport" class="viewport">
            <img id="room-image" src="images/room-start.jpg" alt="Current room">
            
            <!-- Hotspots will be injected here by JavaScript -->
            <div id="hotspots-layer"></div>
            
            <!-- Dev mode overlay (click anywhere to log coordinates) -->
            <div id="dev-overlay" class="dev-overlay">
                <label><input type="checkbox" id="dev-mode"> DEV MODE — click image to log coords</label>
            </div>
        </div>

        <!-- BOTTOM: 3 inventory slots (DOOM-style status bar) -->
        <div id="inventory" class="inventory">
            <div class="slot" id="slot-1"></div>
            <div class="slot" id="slot-2"></div>
            <div class="slot" id="slot-3"></div>
        </div>

    </div>

    <script src="game.js"></script>
</body>
</html>
