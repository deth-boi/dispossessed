<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOOM - UAC Facility</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hud">

        <!-- Top: Dialogue / Message bar (like DOOM messages) -->
        <div id="dialogue" class="dialogue">
            You enter the abandoned UAC entrance. The door ahead is ajar...
        </div>

        <!-- Main Viewport (the "player screen") -->
        <div id="viewport" class="viewport">
            <img id="room-image" src="assets/images/entrance.png" alt="Current room">
            <div id="hotspots-layer"></div>

            <!-- Dev mode helper -->
            <div id="dev-overlay" class="dev-overlay">
                <label><input type="checkbox" id="dev-mode"> DEV MODE (click on door to log coords)</label>
            </div>
        </div>

        <!-- Bottom: Inventory (3 slots, DOOM-style status bar look) -->
        <div id="inventory" class="inventory">
            <div class="slot" id="slot-1"></div>
            <div class="slot" id="slot-2"></div>
            <div class="slot" id="slot-3"></div>
        </div>

    </div>

    <script src="game.js"></script>
</body>
</html>
